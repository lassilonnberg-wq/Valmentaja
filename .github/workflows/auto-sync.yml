name: Auto-Sync Intervals.icu Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Verify sync.py exists
        run: |
          if [ ! -f sync.py ]; then
            echo "❌ ERROR: sync.py not found in repository!"
            ls -la
            exit 1
          fi
          echo "✅ sync.py found"

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"

      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          WEEK_START: ${{ secrets.WEEK_START }}
          ZONE_PREFERENCE: ${{ secrets.ZONE_PREFERENCE }}
        run: |
          echo "🔍 Debug info:"
          echo "  Python version: $(python --version)"
          echo "  Working directory: $(pwd)"
          echo "  ATHLETE_ID: ${ATHLETE_ID:0:5}..."
          echo "  GITHUB_REPO: $GITHUB_REPO"
          echo ""
          echo "🚀 Running sync script..."
          python sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --days 7 \
            --output latest.json || {
              echo "❌ Sync script failed with exit code $?"
              exit 1
            }

      - name: Verify latest.json was created
        run: |
          if [ -f latest.json ]; then
            echo "✅ latest.json exists"
            echo "File size: $(wc -c < latest.json) bytes"
          else
            echo "❌ latest.json not found"
            exit 1
          fi

      - name: Archive and commit all generated files
        if: success()
        run: |
          YEAR_MONTH=$(date -u +"%Y-%m")
          mkdir -p "archive/${YEAR_MONTH}"
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")

          cp latest.json "archive/${YEAR_MONTH}/${TIMESTAMP}.json"
          echo "✅ Archived to archive/${YEAR_MONTH}/${TIMESTAMP}.json"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Pull first — before staging — to avoid merge conflicts
          git pull --rebase --autostash origin main

          # Stage after pull so local versions always win
          git add "archive/${YEAR_MONTH}/${TIMESTAMP}.json"
          git add latest.json
          [ -f ftp_history.json ] && git add ftp_history.json && echo "✅ Staged ftp_history.json"
          [ -f history.json ]     && git add history.json     && echo "✅ Staged history.json"
          [ -f intervals.json ]   && git add intervals.json   && echo "✅ Staged intervals.json"
          [ -f routes.json ]      && git add routes.json      && echo "✅ Staged routes.json"

          if ! git diff --staged --quiet; then
            git commit -m "Sync training data - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push
            echo "✅ Committed and pushed"
          else
            echo "⏭️  No changes to commit"
          fi

      - name: Upload data files for download
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: |
            latest.json
            history.json
            intervals.json
            routes.json
            ftp_history.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Show result
        run: |
          echo "✅ Sync completed successfully!"
          echo "📊 View data: https://raw.githubusercontent.com/${{ github.repository }}/main/latest.json"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::⚠️ Sync failed! Check the logs above for details."
